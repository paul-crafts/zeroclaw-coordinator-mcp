name: Release

on:
  push:
    tags:
      - 'v*'

env:
  BIN_NAME: zeroclaw-coordinator-mcp
  PROJECT_NAME: zeroclaw-coordinator-mcp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: zeroclaw-coordinator-mcp
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin: zeroclaw-coordinator-mcp
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            bin: zeroclaw-coordinator-mcp
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: zeroclaw-coordinator-mcp
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: zeroclaw-coordinator-mcp.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.platform.target }}

      - name: Install Cross
        if: contains(matrix.platform.target, 'linux')
        uses: taiki-e/install-action@cross

      - name: Build binary
        shell: bash
        run: |
          if [[ "${{ matrix.platform.target }}" == *"linux"* ]]; then
            cross build --release --target ${{ matrix.platform.target }}
          else
            cargo build --release --target ${{ matrix.platform.target }}
          fi

      - name: Package as archive
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          if [[ "${{ matrix.platform.os }}" == "windows-latest" ]]; then
            7z a ../../../${{ env.PROJECT_NAME }}-${{ matrix.platform.name }}.zip ${{ matrix.platform.bin }}
          else
            tar czf ../../../${{ env.PROJECT_NAME }}-${{ matrix.platform.name }}.tar.gz ${{ matrix.platform.bin }}
          fi
          cd -

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.PROJECT_NAME }}-${{ matrix.platform.name }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
